name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pywin32 pypiwin32 pillow

      - name: Run Backend Tests
        run: |
          pytest -q

      - name: Create Icon
        run: |
          python -c "from PIL import Image; img = Image.open('logo.png'); img.save('logo.ico', format='ICO', sizes=[(256, 256), (128, 128), (64, 64), (48, 48), (32, 32), (16, 16)])"
        shell: pwsh

      - name: Build Windows Executable
        run: |
          pyinstaller --noconfirm extractarr.spec --clean

      - name: Sign Executable
        if: env.CODE_SIGN_PFX != ''
        env:
          CODE_SIGN_PFX: ${{ secrets.CODE_SIGN_PFX }}
          CODE_SIGN_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [System.Convert]::FromBase64String($env:CODE_SIGN_PFX) | Set-Content $pfxPath -AsByteStream
          $signtool = (Get-ChildItem -Path "C:\Program Files*\Windows Kits\*\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $pfxPath /p $env:CODE_SIGN_PASSWORD "dist\extractarr-service\extractarr-service.exe"
          Remove-Item $pfxPath
        shell: pwsh

      - name: Build Installer (Inno Setup)
        run: |
          $iscc = (Get-ChildItem -Path "C:\Program Files*\Inno Setup *" -Filter "ISCC.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $iscc) {
              $iscc = Get-Command iscc -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          }
          if (-not $iscc) {
              Write-Error "ISCC.exe not found"
              exit 1
          }
          Write-Host "Using ISCC at: $iscc"
          & $iscc /O"Output" /F"ExtractarrSetup" (Join-Path $env:GITHUB_WORKSPACE "installer.iss")
        shell: pwsh

      - name: Sign Installer
        if: env.CODE_SIGN_PFX != ''
        env:
          CODE_SIGN_PFX: ${{ secrets.CODE_SIGN_PFX }}
          CODE_SIGN_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [System.Convert]::FromBase64String($env:CODE_SIGN_PFX) | Set-Content $pfxPath -AsByteStream
          $signtool = (Get-ChildItem -Path "C:\Program Files*\Windows Kits\*\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $pfxPath /p $env:CODE_SIGN_PASSWORD "Output\ExtractarrSetup.exe"
          Remove-Item $pfxPath
        shell: pwsh

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: Output/ExtractarrSetup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run Backend Tests
        run: |
          pytest -q

      - name: Build Linux Executable
        run: |
          pyinstaller --noconfirm extractarr-linux.spec --clean

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-executable
          path: dist/extractarr-linux

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: windows-installer

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-executable
          path: linux-executable

      - name: List Files
        run: ls -R

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-installer/ExtractarrSetup.exe
            linux-executable/extractarr-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
