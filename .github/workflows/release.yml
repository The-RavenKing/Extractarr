name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          # Vite build often requires specific env setup on GH runners
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pywin32 pypiwin32 pillow

      - name: Create Icon
        run: |
          python -c "from PIL import Image; img = Image.open('logo.png'); img.save('logo.ico', format='ICO', sizes=[(256, 256), (128, 128), (64, 64), (48, 48), (32, 32), (16, 16)])"
        shell: pwsh

      - name: Build Windows Executable
        run: |
          pyinstaller --noconfirm extractarr.spec --clean

      - name: Build Installer (Inno Setup)
        run: |
          for /f "delims=" %%i in ('where /r "C:\Program Files*" ISCC.exe') do set "ISCC=%%i"
          if not defined ISCC (
            echo ISCC.exe not found
            exit 1
          )
          echo Using ISCC at: "%ISCC%"
          "%ISCC%" /O"Output" /F"ExtractarrSetup" "%GITHUB_WORKSPACE%\installer.iss"
        shell: cmd

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: Output/ExtractarrSetup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux Executable
        run: |
          pyinstaller --noconfirm extractarr-linux.spec --clean

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-executable
          path: dist/extractarr-linux

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-executable

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-installer/ExtractarrSetup.exe
            linux-executable/extractarr-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
